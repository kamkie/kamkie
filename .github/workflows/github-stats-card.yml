name: Generate GitHub stats card

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/github-stats-card.yml
  schedule:
    - cron: "0 5 * * 0"

permissions:
  contents: write

jobs:
  update:
    name: Update stats card
    runs-on: ubuntu-latest
    steps:
      - uses: datarootsio/github-stats-card@v1.4.5
        with:
          username: kamkie
          gh_token_stats: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          gh_token_commits: ${{ secrets.GITHUB_TOKEN }}
          badge_path: assets/github-stats.svg
          header: "Kamil Kiewisz"
          about: "Java/Spring, TypeScript/React, Kotlin, and DevOps.\nBackend systems, platform work, and delivery automation."
          theme: dark
          commit_message: "Update GitHub stats card"
